<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟤 Tanvi — The Spark</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #2d1b12 30%, #1a0f0a 70%, #0f0f0f 100%);
            color: #ffffff;
            overflow-x: hidden;
            cursor: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ff6b35 0%, #ff8c42 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35, 0 0 60px #ff6b35;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .msg {
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .msg.user {
            text-align: right;
            color: #ff9999;
        }

        .msg.bot {
            text-align: left;
            color: #bda00d;
            font-weight: bold;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 140, 66, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(139, 69, 19, 0.04) 0%, transparent 50%);
            z-index: -2;
        }

        .solar-rays {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background:
                conic-gradient(from 0deg, transparent 0deg, rgba(255, 215, 0, 0.02) 5deg, transparent 10deg),
                conic-gradient(from 30deg, transparent 0deg, rgba(255, 140, 0, 0.015) 3deg, transparent 6deg),
                conic-gradient(from 60deg, transparent 0deg, rgba(255, 165, 0, 0.01) 2deg, transparent 4deg);
            animation: solarRotate 60s linear infinite;
            z-index: -3;
        }

        @keyframes solarRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .story-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .story-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            text-align: center;
            background: linear-gradient(45deg, #c0c0c0, #a8a8a8, #ff6b35, #ff8c42, #ffd700);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: mercuryGradient 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }

        @keyframes mercuryGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .planet-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .mercury-planet {
            width: clamp(180px, 22vw, 300px);
            height: clamp(180px, 22vw, 300px);
            background: radial-gradient(circle at 35% 25%,
                #e8e8e8 0%,
                #d3d3d3 15%,
                #b8b8b8 30%,
                #a0a0a0 45%,
                #8b8b8b 60%,
                #696969 75%,
                #4a4a4a 90%,
                #2f2f2f 100%);
            border-radius: 50%;
            position: relative;
            animation: mercuryFloat 4s ease-in-out infinite, mercuryRotate 20s linear infinite;
            box-shadow:
                0 0 40px rgba(255, 107, 53, 0.2),
                0 0 80px rgba(255, 140, 66, 0.15),
                inset -25px -25px 40px rgba(0, 0, 0, 0.4),
                inset 15px 15px 30px rgba(255, 255, 255, 0.1);
        }

        /* Mercury's craters */
        .mercury-planet::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background:
                radial-gradient(circle at 70% 30%, rgba(0, 0, 0, 0.3) 0%, transparent 8%),
                radial-gradient(circle at 25% 60%, rgba(0, 0, 0, 0.25) 0%, transparent 12%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.2) 0%, transparent 6%),
                radial-gradient(circle at 40% 20%, rgba(0, 0, 0, 0.15) 0%, transparent 4%),
                radial-gradient(circle at 60% 80%, rgba(0, 0, 0, 0.2) 0%, transparent 10%);
        }

        /* Sun glare effect */
        .mercury-planet::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 25%;
            width: 40%;
            height: 40%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.4) 0%, rgba(255, 215, 0, 0.2) 30%, transparent 70%);
            border-radius: 50%;
            filter: blur(2px);
        }

        @keyframes mercuryFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes mercuryRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .story-interface {
            background: linear-gradient(135deg, rgba(45, 27, 18, 0.9), rgba(26, 15, 10, 0.9));
            border: 2px solid #ff6b35;
            border-radius: 20px;
            padding: 2rem;
            margin-top: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.2);
        }

        .story-text {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            min-height: 120px;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            color: #e8e8e8;
            position: relative;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ff6b35;
            margin-left: 2px;
            animation: blink 1s infinite;
            position: relative;
            top: 0.1em;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .story-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .next-btn {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            padding: 0.8rem 2rem;
            background: linear-gradient(45deg, #ff6b35, #ff8c42);
            border: none;
            border-radius: 25px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            min-width: 120px;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
        }

        .next-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .glow-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.04) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: mercuryPulse 6s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes mercuryPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .story-container {
                padding: 1rem;
            }

            .story-interface {
                padding: 1.5rem;
            }

            .story-controls {
                flex-direction: column;
                align-items: stretch;
            }
        } /* end responsive */

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 107, 53, 0.3);
            border-radius: 50%;
            border-top-color: #ff6b35;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Heat shimmer effect */
        .heat-shimmer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 107, 53, 0.005) 2px,
                    rgba(255, 107, 53, 0.005) 4px
                );
            animation: shimmer 4s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100px); }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="solar-rays"></div>
    <div class="heat-shimmer"></div>
    <div class="glow-effect"></div>

    <div class="story-container">
        <h1 class="story-title">Mercury: The Playful Spark</h1>

        <div class="planet-section">
            <div class="mercury-planet" id="mercuryPlanet"></div>
        </div>

        <div class="story-text" id="chatBox"></div>

        <div style="display:flex; gap:10px; margin-top:10px;">
          <input 
                id="userInput" 
                type="text" 
                placeholder="Say something playful..."
                style="
                    flex:1;
                    padding:12px;
                    border-radius:12px;
                    border:1px solid rgba(255, 140, 0, 0.4);
                    background: linear-gradient(145deg, rgba(20,10,0,0.9), rgba(60,30,0,0.7));
                    color:#ffd9a0;
                    outline:none;
                    font-family:'Space Mono', monospace;
                    box-shadow: 0 0 10px rgba(255,140,0,0.2);
                "
            >
            <button onclick="sendMessage()" class="next-btn">Send</button>
        </div>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.custom-cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // Create stars
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';

                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';

                // Some stars closer to Mercury's colors
                if (Math.random() > 0.8) {
                    star.style.background = '#ff6b35';
                    star.style.boxShadow = '0 0 10px #ff6b35';
                }

                starsContainer.appendChild(star);
            }
        }

        // Story management
        let currentStoryPart = 1;
        let totalParts = 40;
        let isTyping = false;

        // Typing animation function
        function typeText(element, text, speed = 35) {
            return new Promise((resolve) => {
                isTyping = true;
                element.innerHTML = '';
                let i = 0;

                // Add cursor
                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                element.appendChild(cursor);

                function typeChar() {
                    if (i < text.length) {
                        // Insert character before cursor
                        const textNode = document.createTextNode(text.charAt(i));
                        element.insertBefore(textNode, cursor);
                        i++;

                        // Variable speed for more natural typing
                        const nextSpeed = speed + Math.random() * 15;
                        setTimeout(typeChar, nextSpeed);
                    } else {
                        // Remove cursor when done
                        setTimeout(() => {
                            cursor.remove();
                            isTyping = false;
                            resolve();
                        }, 500);
                    }
                }

                typeChar();
            });
        }

        // Initialize
        createStars();

                async function sendMessage() {
            const input = document.getElementById("userInput");
            const chat = document.getElementById("chatBox");

            const message = input.value.trim();
            if (!message) return;

            // user message
            chat.innerHTML += `<div class="msg user">> ${message}</div>`;
            input.value = "";

            const res = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    planet: "mercury"
                })
            });

            const data = await res.json();

            // mercury reply
            chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

            chat.scrollTop = chat.scrollHeight;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("userInput");

            input.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        // Handle page visibility for pause/resume animations
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'paused';
                    }
                });
            } else {
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'running';
                    }
                });
            }
        });
    </script>
</body>
</html>
