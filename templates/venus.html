<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟢 Bhavya — The Comfort</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #2C1810 0%, #5D4037 25%, #8D6E63 50%, #BCAAA4 75%, #D7CCC8 100%);
            color: #ffffff;
            cursor: none;
            display: flex;
            flex-direction: column;
        }

        .custom-cursor {
            position: fixed;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #FFB74D 0%, #FF8A65 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px #FFB74D, 0 0 30px #FFB74D, 0 0 45px #FF8A65;
        }

        

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FFECB3;
            border-radius: 50%;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(255, 183, 77, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 40%, rgba(255, 138, 101, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 45% 80%, rgba(188, 170, 164, 0.06) 0%, transparent 40%);
            z-index: -2;
        }

        .story-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
            padding: 1rem;
        }

        .story-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem); /* bigger than before */
            font-weight: 900;
            text-align: center;
            background: linear-gradient(45deg, #FFB74D, #FF8A65, #FFAB40, #FF7043);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 183, 77, 0.3);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .planet-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        .venus-system {
            position: relative;
            width: clamp(280px, 30vw, 400px);
            height: clamp(280px, 30vw, 400px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .venus-planet {
            width: clamp(150px, 20vw, 280px);
            height: clamp(150px, 20vw, 280px);
            background: radial-gradient(circle at 35% 25%,
                #FFE0B2 0%,
                #FFCC02 15%,
                #FFB74D 30%,
                #FF8A65 50%,
                #FF7043 70%,
                #D84315 85%,
                #BF360C 100%);
            border-radius: 50%;
            position: relative;
            animation: float 8s ease-in-out infinite, rotate 20s linear infinite;
            box-shadow:
                0 0 50px rgba(255, 183, 77, 0.4),
                0 0 100px rgba(255, 138, 101, 0.3),
                inset -30px -30px 50px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        /* Venus's atmospheric swirls */
        .venus-planet::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background:
                radial-gradient(ellipse 40% 20% at 30% 20%, rgba(255, 224, 178, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 15% at 70% 40%, rgba(255, 183, 77, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse 50% 25% at 45% 60%, rgba(255, 138, 101, 0.35) 0%, transparent 65%),
                radial-gradient(ellipse 35% 18% at 60% 80%, rgba(216, 67, 21, 0.25) 0%, transparent 50%);
            animation: swirl 15s linear infinite;
        }

        @keyframes swirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Venus's atmospheric layers */
        .venus-atmosphere {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .atmosphere-layer {
            position: absolute;
            border-radius: 50%;
            border: 1px solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: atmosphereFloat 25s ease-in-out infinite;
        }

        .atmosphere-layer:nth-child(1) {
            width: clamp(180px, 24vw, 320px);
            height: clamp(180px, 24vw, 320px);
            border-color: rgba(255, 183, 77, 0.3);
            box-shadow: 0 0 15px rgba(255, 183, 77, 0.2);
        }

        .atmosphere-layer:nth-child(2) {
            width: clamp(210px, 28vw, 360px);
            height: clamp(210px, 28vw, 360px);
            border-color: rgba(255, 138, 101, 0.25);
            box-shadow: 0 0 12px rgba(255, 138, 101, 0.15);
            animation-duration: 30s;
            animation-direction: reverse;
        }

        .atmosphere-layer:nth-child(3) {
            width: clamp(240px, 32vw, 400px);
            height: clamp(240px, 32vw, 400px);
            border-color: rgba(255, 112, 67, 0.2);
            box-shadow: 0 0 10px rgba(255, 112, 67, 0.1);
            animation-duration: 35s;
        }

        #chatBox {
            max-height: 300px; /* increase height */
            overflow-y: auto;
            padding: 15px;
        }

            #chatBox {
        height: 25vh;          /* 🔥 increase this */
        max-height: 70vh;
        overflow-y: auto;
        padding: 16px;
    }

        /* MESSAGE BUBBLES */
        .msg {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            max-width: 70%;   /* IMPORTANT: controls width */
            font-size: 1.1rem; /* 🔥 bigger text */
            line-height: 1.6;
        }

        /* USER (RIGHT SIDE) */
        .msg.user {
            background: rgba(255,255,255,0.1);
            margin-left: auto;
            text-align: right;
        }

        /* BOT (LEFT SIDE) */
      .msg.bot {
    align-self: flex-start;
    background: rgba(20, 10, 5, 0.6);
    color: #f5e6d8;
    padding: 12px 16px;
    border-radius: 12px;
    min-height: 40px;   /* 🔥 increases height */


    max-width: 80%;   /* 🔥 increase width */
}


        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes atmosphereFloat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.6; }
        }

        .story-interface {
            background: linear-gradient(135deg, rgba(93, 64, 55, 0.9), rgba(141, 110, 99, 0.9));
            border: 2px solid #FFB74D;
            border-radius: 25px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(255, 183, 77, 0.2);
            flex-shrink: 0;
            height: auto;
            max-height: 35vh;
            display: flex;
            flex-direction: column;
        }

      

        .story-text {
                background: rgba(20, 10, 5, 0.65); /* darker glass */
            border: 1px solid rgba(255, 180, 120, 0.15);
            border-radius: 12px;
            padding: 14px;
            backdrop-filter: blur(6px);
            color: #f5e6d8;
            font-size: clamp(1.1rem, 2vw, 1.1rem);
            line-height: 1.6;
            margin-bottom: 1rem;
            height: clamp(80px, 15vh, 120px);
            padding: 1rem;
            background: rgba(44, 24, 16, 0.6);
            border-radius: 15px;
            border: 1px solid rgba(255, 183, 77, 0.4);
            color: #FFF8E1;
            position: relative;
            font-weight: 400;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #FFB74D;
            margin-left: 2px;
            animation: blink 1s infinite;
            position: relative;
            top: 0.1em;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .story-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .next-btn {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            background: linear-gradient(45deg, #FFB74D, #FF8A65);
            border: none;
            border-radius: 30px;
            color: #3E2723;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: capitalize;
            letter-spacing: 0.05em;
            box-shadow: 0 0 25px rgba(255, 183, 77, 0.3);
            min-width: 100px;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 183, 77, 0.5);
        }

        .next-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }


        .glow-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(255, 183, 77, 0.04) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 10s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.15; }
        }

        /* Atmospheric particles */
        .atmosphere-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FFE0B2;
            border-radius: 50%;
            box-shadow: 0 0 4px #FFE0B2;
            animation: particle-float 3s infinite;
        }

        @keyframes particle-float {
            0%, 100% { opacity: 0; transform: scale(0.5) translateY(0); }
            50% { opacity: 1; transform: scale(1) translateY(-10px); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .story-container {
                padding: 0.5rem;
            }

            .story-interface {
                padding: 1rem;
                max-height: 40vh;
            }

            .story-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 183, 77, 0.3);
            border-radius: 50%;
            border-top-color: #FFB74D;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="glow-effect"></div>

    <div class="story-container">
        <h1 class="story-title">Venus: The Gentle Warmth</h1>

        <div class="planet-section">
            <div class="venus-system" id="venusSystem">
                <div class="venus-atmosphere">
                    <div class="atmosphere-layer"></div>
                    <div class="atmosphere-layer"></div>
                    <div class="atmosphere-layer"></div>
                </div>
                <div class="venus-planet" id="venusPlanet"></div>
            </div>
        </div>

            <div class="story-text" id="chatBox"></div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                    <input 
                        id="userInput" 
                        type="text" 
                        placeholder="Say something..."
                        style="
                            flex:1;
                            padding:10px 12px;
                            border-radius:8px;
                            border:1px solid rgba(255,200,150,0.15);
                            background: rgba(0,0,0,0.25);
                            color:#f5e6d8;
                            outline:none;
                            font-size:14px;
                        "
                    >
                <button onclick="sendMessage()" class="next-btn">Send</button>
            </div>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.custom-cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // Create stars
function createStars() {
    const container = document.querySelector(".stars");

    for (let i = 0; i < 100; i++) {
        const star = document.createElement("div");
        star.className = "star";

        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";

        container.appendChild(star);
    }
}

        document.addEventListener("DOMContentLoaded", () => {
    createStars();
});

        let isSending = false;

        async function sendMessage() {
            if (isSending) return;

            const input = document.getElementById("userInput");
            const chat = document.getElementById("chatBox");

            const message = input.value.trim();
            if (!message) return;

            isSending = true;

            // 👤 USER MESSAGE
            const userMsg = document.createElement("div");
            userMsg.className = "msg user";
            userMsg.innerText = message;
            chat.appendChild(userMsg);

            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // 🤖 BOT MESSAGE (THINKING STATE)
            const botMsg = document.createElement("div");
            botMsg.className = "msg bot";
            botMsg.innerHTML = "Thinking...";
            chat.appendChild(botMsg);

            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        planet: window.location.pathname.split("/").pop()
                    })
                });

                const data = await res.json();

                // ✨ TYPEWRITER EFFECT
                await typeText(botMsg, data.reply, 18);

            } catch {
                botMsg.innerText = "Something went wrong...";
            }

            chat.scrollTop = chat.scrollHeight;
            isSending = false;
        }
        // Create atmospheric particles
        function createAtmosphericParticles() {
            const atmosphereLayers = document.querySelectorAll('.atmosphere-layer');
            atmosphereLayers.forEach((layer, layerIndex) => {
                for (let i = 0; i < 6; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'atmosphere-particle';

                    const angle = (i / 6) * 360;
                    const radius = (layer.offsetWidth / 2) - 15;
                    const x = Math.cos(angle * Math.PI / 180) * radius;
                    const y = Math.sin(angle * Math.PI / 180) * radius;

                    particle.style.left = `calc(50% + ${x}px)`;
                    particle.style.top = `calc(50% + ${y}px)`;
                    particle.style.animationDelay = (i * 0.5 + layerIndex * 0.3) + 's';

                    layer.appendChild(particle);
                }
            });
        }

        // Story management
        let currentStoryPart = 1;
        let totalParts = 54;
        let isTyping = false;

        function typeText(element, text, speed = 20) {
    return new Promise((resolve) => {
        element.innerHTML = "";
        let i = 0;

        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }

        type();
    });
}
        // Button hover effects
        document.querySelectorAll('.next-btn, .home-btn').forEach(element => {
            element.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(1.5)';
            });

            element.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("userInput");

            input.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault(); // stop newline
                    sendMessage();
                }
            });
        });

                // Initialize
        createStars();


        // Story progression function
        async function nextStory() {
            if (isTyping) return; // Prevent clicking during typing

            const nextBtn = document.getElementById('nextBtn');
            const storyText = document.getElementById('storyText');

            // Disable button and show loading
            nextBtn.disabled = true;
            nextBtn.innerHTML = '<div class="loading"></div> Loading...';

            try {
                // Make request to Flask backend
                const response = await fetch('/venus', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        story_part: currentStoryPart
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const newText = data.message || data.text || 'Story continues...';

                    await typeText(storyText, newText, 30);


                    // Update planet image if provided
                    if (data.planet_image) {
                        updatePlanetImage(data.planet_image);
                    }

                    // Check if story is complete
                    if (data.is_complete || currentStoryPart >= totalParts) {
                        nextBtn.textContent = 'Story Complete';
                        nextBtn.disabled = true;
                    }

                } else {
                    throw new Error('Failed to load story');
                }

            } catch (error) {
                console.error('Error:', error);
                await typeText(storyText, 'Error loading story. Please try again.', 45);
            } finally {
                // Re-enable button
                if (currentStoryPart < totalParts) {
                    nextBtn.disabled = false;
                    nextBtn.textContent = 'Next →';
                }
            }
        }


        // Update planet image (for dynamic changes)
        function updatePlanetImage(imageUrl) {
            const venus = document.getElementById('venusPlanet');
            // Add a pulse effect to indicate change
            venus.style.animation = 'float 8s ease-in-out infinite, rotate 20s linear infinite, pulse 1s ease-in-out';
            setTimeout(() => {
                venus.style.animation = 'float 8s ease-in-out infinite, rotate 20s linear infinite';
            }, 1000);
        }

        // Navigate back to home
        function goHome() {
            if (isTyping) return; // Prevent navigation during typing
            window.location.href = '/';
        }

        // Skip typing animation on click
        document.getElementById('storyText').addEventListener('click', () => {
            if (isTyping) {
                // Fast-forward typing by reducing the global speed
                // This could be enhanced further to instantly complete typing
                isTyping = false;
            }
        });

        // Initialize
        createStars();
        createAtmosphericParticles();

        // Handle page visibility for pause/resume animations
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'paused';
                    }
                });
            } else {
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'running';
                    }
                });
            }
        });
    </script>
</body>
</html>
